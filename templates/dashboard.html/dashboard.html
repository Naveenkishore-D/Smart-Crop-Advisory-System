<h2>Farmer Dashboard</h2>

<h3>Weather Information</h3>

Temperature : {{weather.temperature}} °C <br>
Humidity : {{weather.humidity}} % <br>
Wind Speed : {{weather.wind}} m/s

<hr>

<h3>Enter Soil Data</h3>

<form action="/predict" method="post">

<input name="N" placeholder="Nitrogen"><br>
<input name="P" placeholder="Phosphorus"><br>
<input name="K" placeholder="Potassium"><br>

<input name="temperature" placeholder="Temperature"><br>
<input name="humidity" placeholder="Humidity"><br>

<input name="ph" placeholder="Soil pH"><br>
<input name="rainfall" placeholder="Rainfall"><br>

<button type="submit">Predict Crop</button>

</form>
